name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: build-test (${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev g++-13 libstdc++-13-dev
          # sotn4m/json uses std::expected (C++23); point gcc/g++ and clang at libstdc++ 13.
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DHTTP_SERVER_BUILD_TESTS=ON \
            -DHTTP_SERVER_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Install smoke test
        run: |
          cmake --install build --prefix "${{ runner.temp }}/install"
          test -f "${{ runner.temp }}/install/lib/cmake/HttpServer/HttpServerConfig.cmake"
          test -f "${{ runner.temp }}/install/include/http-server/HttpServer.h"
          test -f "${{ runner.temp }}/install/lib/libhttp-server.a"
